<style>
  /* Per-theme foundation background, painted before the CSS bundle loads (the
   * theme class is set by the script below) so refresh / navigation never flash.
   * Hardcoded to mirror each theme's `--foundation` — the CSS vars aren't
   * available pre-bundle. Graphite (`.graphite`) is Storybook's default. */
  html,
  html.graphite { background-color: #2C2D32; }       /* Graphite (default dark) — graphite-950 */
  html.paper { background-color: #EFF0EB; }          /* Paper (light) — paper-200 foundation */
  html.ink { background-color: #020812; }            /* Ink (night) — ink-950 page */

  /* Storybook's own chrome / white loaders / docs blocks → inherit the theme
   * background above so nothing flashes white. `!important` is used ONLY here
   * (Storybook dev-tooling, never shipped) to beat Storybook's stylesheet
   * regardless of load order; selectors are Storybook containers only, never
   * story content. */
  body,
  #storybook-root,
  #storybook-docs,
  .sb-show-main,
  .sb-preparing-story,
  .sb-preparing-docs,
  .sbdocs,
  .sbdocs-wrapper,
  .sbdocs-content,
  .sbdocs-preview,
  .docs-story {
    background-color: inherit !important;
  }
</style>
<script>
  // Set the theme class before first paint, from the persisted toolbar choice in
  // the iframe URL `globals`, else the Graphite (`.graphite`) default. Mirrors
  // preview.ts THEMES — each theme is its own identity class.
  (function () {
    var THEMES = {
      graphite: 'graphite',
      paper:    'paper',
      ink:      'ink',
    };
    var name;
    try {
      var globals = new URLSearchParams(window.location.search).get('globals') || '';
      var m = globals.match(/theme:([\w-]+)/);
      if (m) name = m[1];
    } catch (e) {}
    var root = document.documentElement;
    root.classList.add(THEMES[name] || THEMES.graphite);
  })();
</script>
