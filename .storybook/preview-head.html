<style>
  /* Per-theme foundation background, painted before the CSS bundle loads (the
   * theme class is set by the script below) so refresh / navigation never flash.
   * Hardcoded to mirror each theme's `--foundation` — the CSS vars aren't
   * available pre-bundle. Graphite is the bare default. */
  html { background-color: #2C2D32; }                   /* Graphite (dark, default) — graphite-950 */
  html.theme-ink { background-color: #020812; }      /* Ink (deep navy) — ink-950 page */
  html.theme-paper { background-color: #EFF0EB; }    /* Paper (cool)    — paper-200 foundation */

  /* Storybook's own chrome / white loaders / docs blocks → inherit the theme
   * background above so nothing flashes white. `!important` is used ONLY here
   * (Storybook dev-tooling, never shipped) to beat Storybook's stylesheet
   * regardless of load order; selectors are Storybook containers only, never
   * story content. */
  body,
  #storybook-root,
  #storybook-docs,
  .sb-show-main,
  .sb-preparing-story,
  .sb-preparing-docs,
  .sbdocs,
  .sbdocs-wrapper,
  .sbdocs-content,
  .sbdocs-preview,
  .docs-story {
    background-color: inherit !important;
  }
</style>
<script>
  // Set the theme class (and `.dark` for dark modes) before first paint, from the
  // persisted toolbar choice in the iframe URL `globals`, else the Graphite default.
  // Mirrors preview.ts THEMES.
  (function () {
    var THEMES = {
      graphite: { cls: 'theme-graphite', dark: true },
      ink:      { cls: 'theme-ink',      dark: true },
      paper:    { cls: 'theme-paper',    dark: false },
    };
    var name;
    try {
      var globals = new URLSearchParams(window.location.search).get('globals') || '';
      var m = globals.match(/theme:([\w-]+)/);
      if (m) name = m[1];
    } catch (e) {}
    var t = THEMES[name] || THEMES.graphite;
    var root = document.documentElement;
    root.classList.add(t.cls);
    if (t.dark) root.classList.add('dark');
  })();
</script>
