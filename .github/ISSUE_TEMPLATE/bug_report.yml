name: Bug report
description: Something in @waveso/ui isn't working as expected
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for the report! Please fill in what you can.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Minimal steps or a link (StackBlitz/CodeSandbox/repo) that reproduces it.
    validations:
      required: true
  - type: input
    id: component
    attributes:
      label: Component
      description: Which component(s)? e.g. `Dialog`, `Select`.
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: "`@waveso/ui`, `@base-ui/react`, React, and browser/runtime versions."
      placeholder: |
        @waveso/ui: 0.x.x
        @base-ui/react: 1.x.x
        react: 19.x.x
    validations:
      required: true
